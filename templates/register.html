<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl w-80">
<h2 class="text-xl font-bold mb-4 text-center">Create Account</h2>

<form method="post">
<input name="name" placeholder="Name" class="w-full p-2 border mb-3">
<input name="pin" placeholder="PIN" class="w-full p-2 border mb-3">
<button class="w-full bg-green-500 text-white p-2 rounded">Create</button>
</form>

<a href="/" class="text-blue-500 block text-center mt-3">Back to Login</a>
</div>

</body>
</html>
