<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Bank | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --primary: #6366f1; --bg-dark: #0f172a; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .pin-box-active {
            border-color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .key-tap:active { transform: scale(0.92); background: rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body>

    <div class="glass w-full max-w-4xl rounded-[2rem] flex flex-col md:flex-row overflow-hidden m-4">
        <div class="md:w-5/12 p-8 bg-indigo-600/10 flex flex-col justify-between border-r border-white/5">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-white text-sm"></i>
                    </div>
                    <span class="text-lg font-bold tracking-tight">NEXUS<span class="text-indigo-400">BANK</span></span>
                </div>
                <h1 class="text-3xl font-semibold leading-tight mb-3">Secure <br>Entry Point</h1>
                <p class="text-slate-400 text-sm font-light">Enter credentials to proceed to your dashboard.</p>
            </div>

            <div class="space-y-4 pt-6 border-t border-white/5">
                <div class="flex items-center gap-3 text-xs text-slate-400">
                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    System Online
                </div>
            </div>
        </div>

        <div class="md:w-7/12 p-8">
            <form id="atmForm" method="POST" onsubmit="return validateForm()">
                
                <div class="mb-5">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Account Number</label>
                    <div class="relative">
                        <i class="fa-solid fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input name="acc" id="acc" type="text" required autocomplete="off"
                            placeholder="Account Number" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 outline-none focus:border-indigo-500 transition-all font-mono text-base">
                    </div>
                </div>

                <div class="mb-5">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Security PIN</label>
                        <button type="button" onclick="togglePin()" class="text-[10px] text-indigo-400 hover:text-indigo-300">
                            <i id="eye-icon" class="fa-solid fa-eye-slash"></i> HIDE
                        </button>
                    </div>
                    <div class="flex gap-3">
                        <input type="password" readonly class="pin-box w-full h-12 bg-slate-800/50 border border-slate-700 rounded-lg text-center text-lg font-bold">
                        <input type="password" readonly class="pin-box w-full h-12 bg-slate-800/50 border border-slate-700 rounded-lg text-center text-lg font-bold">
                        <input type="password" readonly class="pin-box w-full h-12 bg-slate-800/50 border border-slate-700 rounded-lg text-center text-lg font-bold">
                        <input type="password" readonly class="pin-box w-full h-12 bg-slate-800/50 border border-slate-700 rounded-lg text-center text-lg font-bold">
                    </div>
                    <input type="hidden" name="pin" id="pin-hidden">
                </div>

                <div class="grid grid-cols-3 gap-2 mb-5" id="keypad"></div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold py-3.5 rounded-xl transition-all active:scale-[0.98]">
                    AUTHORIZE ACCESS
                </button>
            </form>

            <div class="mt-5 text-center">
                <p class="text-slate-500 text-xs">
                    Don't have an account? 
                    <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors ml-1">
                        Create Account
                    </a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 px-5 py-2.5 rounded-full glass border-indigo-500/30 text-white text-xs opacity-0 transition-all duration-500"></div>

    <script>
        const pinHidden = document.getElementById('pin-hidden');
        const boxes = document.querySelectorAll('.pin-box');
        let currentPin = "";

        const keys = ['1','2','3','4','5','6','7','8','9','C','0','⌫'];
        const keypad = document.getElementById('keypad');
        keys.forEach(k => {
            const b = document.createElement('button');
            b.type = "button";
            b.innerText = k;
            b.className = `key-tap h-10 rounded-lg text-sm font-bold bg-white/5 hover:bg-white/10 transition-all ${k === 'C' ? 'text-red-400' : k === '⌫' ? 'text-yellow-400' : ''}`;
            b.onclick = () => {
                if(k === 'C') currentPin = "";
                else if(k === '⌫') currentPin = currentPin.slice(0, -1);
                else if(currentPin.length < 4) currentPin += k;
                updateUI();
            };
            keypad.appendChild(b);
        });

        function updateUI() {
            pinHidden.value = currentPin;
            boxes.forEach((box, i) => {
                box.value = currentPin[i] || "";
                box.classList.toggle('pin-box-active', i === currentPin.length);
            });
        }

        function togglePin() {
            const type = boxes[0].type === "password" ? "text" : "password";
            boxes.forEach(b => b.type = type);
            const icon = document.getElementById('eye-icon');
            icon.className = type === "password" ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
            icon.nextSibling.textContent = type === "password" ? " HIDE" : " SHOW";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function validateForm() {
            if (document.getElementById('acc').value.length < 4 || currentPin.length < 4) {
                showToast("Please enter valid account and 4-digit PIN");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
